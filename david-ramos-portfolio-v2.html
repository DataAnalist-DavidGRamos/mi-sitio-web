// ── COUNTER ───────────────────────────────────────────────
function Counter({target, suffix="", duration=2000}) {
  const [val, setVal] = React.useState(0);
  const ref = React.useRef(null);
  const fired = React.useRef(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if(e.isIntersecting && !fired.current) {
        fired.current = true;
        const num = parseFloat(target);
        const isInt = Number.isInteger(num);
        let cur = 0;
        const step = num / (duration / 16);
        const t = setInterval(() => {
          cur = Math.min(cur + step, num);
          setVal(isInt ? Math.floor(cur) : cur.toFixed(1));
          if(cur >= num) clearInterval(t);
        }, 16);
      }
    }, {threshold: 0.5});
    if(ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return <span ref={ref}>{val}{suffix}</span>;
}

// ── NETWORK CANVAS ────────────────────────────────────────
function NetworkBG() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const c = ref.current;
    if(!c) return;
    const ctx = c.getContext('2d');
    let raf, W, H;
    const resize = () => { W=c.width=c.offsetWidth; H=c.height=c.offsetHeight; };
    resize();
    window.addEventListener('resize', resize);
    const nodes = Array.from({length:40}, () => ({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-0.5)*0.35,vy:(Math.random()-0.5)*0.35,
      r:Math.random()*2.5+0.5
    }));
    const draw = () => {
      ctx.clearRect(0,0,W,H);
      nodes.forEach(n => {
        n.x+=n.vx; n.y+=n.vy;
        if(n.x<0||n.x>W) n.vx*=-1;
        if(n.y<0||n.y>H) n.vy*=-1;
        for(let j=0;j<nodes.length;j++) {
          const dx=n.x-nodes[j].x,dy=n.y-nodes[j].y;
          const d=Math.sqrt(dx*dx+dy*dy);
          if(d<130&&d>0) {
            ctx.beginPath();
            ctx.strokeStyle=`rgba(59,130,246,${(1-d/130)*0.3})`;
            ctx.lineWidth=0.7;
            ctx.moveTo(n.x,n.y); ctx.lineTo(nodes[j].x,nodes[j].y);
            ctx.stroke();
          }
        }
        ctx.beginPath();
        ctx.fillStyle='rgba(59,130,246,0.65)';
        ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
        ctx.fill();
      });
      raf=requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize',resize); };
  }, []);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0.5}}/>;
}
